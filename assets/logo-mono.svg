<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Claude Cairn">
  <title>Claude Cairn</title>
  <desc>A cairn of four stacked stones, single color.</desc>
  <!-- Single-color silhouette. Uses currentColor so it inherits text color where
       embedded; falls back to ink #2B2622. -->
  <g fill="currentColor" color="#2B2622">
    <rect x="9"    y="43" width="46" height="13" rx="6.5"/>
    <rect x="13.5" y="30" width="37" height="11" rx="5.5"/>
    <rect x="18.5" y="19" width="27" height="9"  rx="4.5"/>
    <rect x="23"   y="8"  width="18" height="9"  rx="4.5"/>
  </g>
</svg>
