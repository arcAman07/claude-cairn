name: tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dev tools (the engine itself is stdlib-only)
        run: |
          python -m pip install --upgrade pip
          pip install pyflakes ruff coverage

      - name: Lint
        run: |
          python -m pyflakes lib hooks tests mcp
          python -m ruff check lib hooks tests mcp

      - name: Unit tests + coverage
        run: |
          python -m coverage run --source=lib,hooks,mcp -m unittest discover -s tests -p "test_*.py"
          python -m coverage report

      - name: Selftest + install verification
        run: |
          python lib/cairn.py selftest
          python mcp/cairn_mcp.py --selftest
          bash tests/verify_install.sh
